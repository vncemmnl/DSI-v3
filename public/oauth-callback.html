<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Google Authentication Callback</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f8fafc;
      color: #334155;
    }
    .loader {
      border: 3px solid #cbd5e1;
      border-top: 3px solid #4f46e5;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h2 {
      font-size: 1.125rem;
      font-weight: 600;
      margin: 0 0 8px 0;
    }
    p {
      font-size: 0.875rem;
      color: #64748b;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <h2>Connecting Your Google Account</h2>
  <p>Please wait, finalizing secure authentication...</p>

  <script>
    // Extract access token or error from hash fragment
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.startsWith('#') ? hash.substring(1) : hash);
    const accessToken = params.get('access_token');
    const error = params.get('error');

    if (window.opener) {
      if (accessToken) {
        window.opener.postMessage({ type: 'GOOGLE_OAUTH_SUCCESS', accessToken }, '*');
      } else if (error) {
        window.opener.postMessage({ type: 'GOOGLE_OAUTH_FAILURE', error }, '*');
      } else {
        window.opener.postMessage({ type: 'GOOGLE_OAUTH_FAILURE', error: 'No token found' }, '*');
      }
      setTimeout(() => {
        window.close();
      }, 500);
    } else {
      document.body.innerHTML = '<h2>Authentication successful</h2><p>You can now safely close this window.</p>';
    }
  </script>
</body>
</html>
